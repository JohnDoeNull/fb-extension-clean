<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FB Campaign</title>
  <link rel="stylesheet" href="../css/popup.css" />
</head>
<body>
  <main>
    <h1>FB Campaign</h1>
    <label>Campaign name <input id="name" placeholder="Weekly promo" /></label>
    <label>Message <textarea id="message" rows="5" placeholder="Write your post..."></textarea></label>
    <label>Target URLs (one per line) <textarea id="targets" rows="4" placeholder="https://www.facebook.com/groups/...\nhttps://www.facebook.com/groups/..."></textarea></label>
    <label>Delay between targets (seconds) <input id="delay" type="number" min="10" value="90" /></label>

    <div class="row">
      <button id="save">Save campaign</button>
      <button id="run">Run now</button>
    </div>
    <div class="row">
      <button id="pause">Pause</button>
      <button id="resume">Resume</button>
    </div>
    <div class="row">
      <button id="paste">Assisted paste</button>
      <button id="clearLogs">Clear logs</button>
    </div>

    <h2>FB quick control</h2>
    <div class="row">
      <button id="openHome">Open Home</button>
      <button id="openGroups">Open Groups</button>
    </div>
    <div class="row">
      <button id="openPages">Open Pages</button>
      <button id="openMessages">Open Messages</button>
    </div>
    <div class="row">
      <button id="openFirstTarget">Open 1st Target</button>
      <button id="openAllTargets">Open All Targets</button>
    </div>

    <hr/>
    <h2>Saved campaigns</h2>
    <select id="campaigns"></select>
    <div class="row">
      <button id="load">Load</button>
      <button id="delete">Delete</button>
    </div>

    <div class="row">
      <button id="export">Export JSON</button>
      <label class="fileBtn">Import JSON<input id="importFile" type="file" accept="application/json" /></label>
    </div>

    <h2>Run logs</h2>
    <pre id="logs"></pre>

    <p id="status"></p>
  </main>
  <script type="module" src="../js/popup.js"></script>
</body>
</html>
